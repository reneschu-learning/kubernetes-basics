apiVersion: apps/v1
kind: Deployment
metadata:
  name: gallery-v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gallery
      version: v1
  template:
    metadata:
      labels:
        app: gallery
        version: v1
    spec:
      containers:
      - name: gallery
        image: rsdemos.azurecr.io/picture-gallery:1.0.1-linux-arm64
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gallery-v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gallery
      version: v2
  template:
    metadata:
      labels:
        app: gallery
        version: v2
    spec:
      containers:
      - name: gallery
        image: rsdemos.azurecr.io/picture-gallery:1.2.0-linux-arm64
        imagePullPolicy: Always
        ports:
        - containerPort: 80