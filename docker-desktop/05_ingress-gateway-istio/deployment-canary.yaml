---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gallery-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gallery-backend
  template:
    metadata:
      labels:
        app: gallery-backend
    spec:
      containers:
      - name: backend
        image: rsdemos.azurecr.io/picture-gallery-backend:1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: gallery-config
        volumeMounts:
        - name: logs
          mountPath: '/logs'
        - name: content
          mountPath: '/conf/hostData.json'
      - name: busybox
        image: busybox
        command: ['sh', '-c', 'touch /logs/log.txt && tail -n+1 -F /logs/log.txt']
        volumeMounts:
        - name: logs
          mountPath: '/logs'
      volumes:
      - name: logs
        emptyDir: {}
      - name: content
        hostPath:
          path: '/tmp/hostData.json'
          type: FileOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
spec:
  type: ClusterIP
  selector:
    app: gallery-backend
  ports:
  - port: 8000
    targetPort: 8000