apiVersion: apps/v1
kind: Deployment
metadata:
  name: gallery-dep
spec:
  replicas: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gallery
  template:
    metadata:
      labels:
        app: gallery
    spec:
      containers:
      - name: gallery
        image: rsdemos.azurecr.io/picture-gallery:1.2.0
        imagePullPolicy: Always
        ports:
        - containerPort: 80
