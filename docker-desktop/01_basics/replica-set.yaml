apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: gallery-rs
  labels:
    app: gallery
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gallery
  template:
    metadata:
      labels:
        app: gallery
    spec:
      containers:
        - name: gallery
          image: rsdemos.azurecr.io/picture-gallery:1.0.1-linux-arm64
          imagePullPolicy: Always
          ports:
            - containerPort: 80
