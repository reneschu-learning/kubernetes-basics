#=======================================================
# Frontend
#=======================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gallery
spec:
  selector:
    matchLabels:
      app: gallery
      version: v3
  template:
    metadata:
      labels:
        app: gallery
        version: v3
    spec:
      containers:
      - name: gallery
        image: rsdemos.azurecr.io/picture-gallery:2.0.1
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: 64Mi
            cpu: 250m
          limits:
            memory: 128Mi
            cpu: 500m
---
#=======================================================
# Backend
#=======================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gallery-backend
spec:
  selector:
    matchLabels:
      app: gallery-backend
  template:
    metadata:
      labels:
        app: gallery-backend
    spec:
      containers:
      - name: backend
        image: rsdemos.azurecr.io/picture-gallery-backend:1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: LOG_FILE
          value: '/logs/log.txt'
        resources:
          requests:
            memory: 64Mi
            cpu: 250m
          limits:
            memory: 128Mi
            cpu: 500m
        volumeMounts:
        - name: logs
          mountPath: '/logs'
      volumes:
      - name: logs
        emptyDir: {}
