apiVersion: apps/v1
kind: Deployment
metadata:
  name: gallery-dep
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gallery
      version: v3
  template:
    metadata:
      labels:
        app: gallery
        version: v3
    spec:
      nodeSelector:
        kubernetes.io/hostname: minikube-m02
      containers:
      - name: gallery
        image: rsdemos.azurecr.io/picture-gallery:1.3.0
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: 64Mi
            cpu: 250m
          limits:
            memory: 128Mi
            cpu: 500m