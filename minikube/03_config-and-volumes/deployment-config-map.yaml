apiVersion: apps/v1
kind: Deployment
metadata:
  name: gallery-dep
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gallery
      version: v3
  template:
    metadata:
      labels:
        app: gallery
        version: v3
    spec:
      containers:
      - name: gallery
        image: rsdemos.azurecr.io/picture-gallery:1.3.1
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: gallery-config
---
apiVersion: v1
kind: Service
metadata:
  name: gallery-svc
spec:
  type: LoadBalancer
  selector:
    app: gallery
    version: v3
  ports:
  - port: 8080
    targetPort: 80
